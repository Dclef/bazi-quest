<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="开始你的八字调查问卷。输入出生信息，系统会自动排盘，并按你的八字特征动态匹配口诀题目，测试学业、事业、婚姻、财运等内容。">
  <meta name="keywords" content="八字调查问卷,八字测试,八字口诀,盲派八字,八字问卷,四柱测试">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_CN">
  <meta property="og:site_name" content="八字调查问卷">
  <meta property="og:title" content="开始测试：看看你的八字口诀准不准">
  <meta property="og:description" content="输入出生信息后自动排盘，系统会按八字动态出题，看看古法口诀与你的人生经历到底有多吻合。">
  <meta name="twitter:card" content="summary_large_image">
  <title>开始测试：看看你的八字口诀准不准 | 八字调查问卷</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-icon">卦</span>
      <span class="nav-logo-text">八字调查问卷</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="quiz.html" class="active">立即测试</a></li>
      <li><a href="stats.html">📊 统计</a></li>
    </ul>
  </nav>

  <!-- Progress -->
  <div class="container">
    <div class="progress-wrap" id="progressWrap" style="display: none;">
      <div class="progress-header">
        <span class="progress-label" id="progressDimension">—</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- Quiz Content -->
  <section class="quiz-section">
    <div class="container">

      <!-- Step 1: Birth Info -->
      <div class="quiz-step active" id="stepBirth">
        <div class="step-title">第一步 · 输入出生信息</div>
        <div class="step-desc">系统会自动排盘，并按您的八字特征动态匹配题目，避免出现“命局无财却大量问财、无印却反复问印”的情况。</div>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">出生年份<span class="required">*</span></label>
              <input type="number" class="form-input" id="birthYear" placeholder="如：1990" min="1920" max="2025">
            </div>
            <div class="form-group">
              <label class="form-label">出生月份<span class="required">*</span></label>
              <select class="form-select" id="birthMonth">
                <option value="">请选择</option>
                <option value="1">1月</option><option value="2">2月</option>
                <option value="3">3月</option><option value="4">4月</option>
                <option value="5">5月</option><option value="6">6月</option>
                <option value="7">7月</option><option value="8">8月</option>
                <option value="9">9月</option><option value="10">10月</option>
                <option value="11">11月</option><option value="12">12月</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">出生日期<span class="required">*</span></label>
              <input type="number" class="form-input" id="birthDay" placeholder="如：15" min="1" max="31">
            </div>
            <div class="form-group">
              <label class="form-label">出生时辰<span class="required">*</span></label>
              <select class="form-select" id="birthHour">
                <option value="">请选择</option>
                <option value="0">子时 (23:00-01:00)</option>
                <option value="1">丑时 (01:00-03:00)</option>
                <option value="3">寅时 (03:00-05:00)</option>
                <option value="5">卯时 (05:00-07:00)</option>
                <option value="7">辰时 (07:00-09:00)</option>
                <option value="9">巳时 (09:00-11:00)</option>
                <option value="11">午时 (11:00-13:00)</option>
                <option value="13">未时 (13:00-15:00)</option>
                <option value="15">申时 (15:00-17:00)</option>
                <option value="17">酉时 (17:00-19:00)</option>
                <option value="19">戌时 (19:00-21:00)</option>
                <option value="21">亥时 (21:00-23:00)</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">性别<span class="required">*</span></label>
            <div style="display: flex; gap: 16px;">
              <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary);">
                <input type="radio" name="gender" value="1"> 男
              </label>
              <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary);">
                <input type="radio" name="gender" value="0"> 女
              </label>
            </div>
          </div>
          <div class="btn-group" style="margin-top: 24px;">
            <button class="btn btn-primary" id="btnCalculate" type="button">排盘计算 →</button>
          </div>
          <p id="birthError" style="color: var(--danger); font-size: 0.85rem; text-align: center; margin-top: 12px; display: none;"></p>
        </div>
      </div>

      <!-- Step 2: Confirm Bazi -->
      <div class="quiz-step" id="stepBazi">
        <div class="step-title">第二步 · 确认您的八字</div>
        <div class="step-desc">以下是根据您的出生信息自动排出的八字四柱，请确认后继续。</div>

        <div class="bazi-display" id="baziDisplay"></div>

        <div class="card" id="baziExtra" style="margin-top: 16px;">
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; font-size: 0.85rem; color: var(--text-secondary);">
            <div><strong style="color: var(--gold);">格局：</strong><span id="baziPattern">—</span></div>
            <div><strong style="color: var(--gold);">日主：</strong><span id="baziDayMaster">—</span></div>
            <div><strong style="color: var(--gold);">身强弱：</strong><span id="baziStrength">—</span></div>
            <div id="baziRelationsWrap"></div>
          </div>
        </div>

        <div class="quiz-nav">
          <button class="btn btn-secondary" id="btnBackBirth">← 修改出生信息</button>
          <button class="btn btn-primary" id="btnStartQuiz">确认，开始答题 →</button>
        </div>
      </div>

      <!-- Step 3: Questions -->
      <div class="quiz-step" id="stepQuestions">
        <div id="questionContainer"></div>
        <div class="quiz-nav">
          <button class="btn btn-secondary" id="btnPrevDim">← 上一维度</button>
          <div class="quiz-nav-info" id="quizNavInfo"></div>
          <button class="btn btn-primary" id="btnNextDim">下一维度 →</button>
        </div>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>八字调查问卷 · 基于传统口诀与盲派资料整理 · 请按真实经历作答</p>
    </div>
  </footer>

  <script src="js/vendor/lunar.js"></script>
  <script src="js/site-config.js"></script>
  <script src="js/bazi.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/datastore.js"></script>
  <script src="js/bazi-renderer.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
